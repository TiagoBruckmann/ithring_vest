name: ithring_vest
description: "deixar de ter dor com o dinheiro para alcançar a liberdade financeira."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+6

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  currency_text_input_formatter: ^2.3.0
  firebase_performance: ^0.11.4+1
  flutter_secure_storage: ^10.2.0
  font_awesome_flutter: ^11.0.0
  firebase_crashlytics: ^5.2.2
  flutter_masked_text2: ^0.9.1
  firebase_app_check: ^0.4.4+1
  firebase_analytics: ^12.4.1
  shimmer_animation: ^2.2.2+1
  package_info_plus: ^9.0.0
  device_info_plus: ^10.1.2
  firebase_storage: ^13.4.1
  connectivity_plus: ^7.1.1
  onesignal_flutter: ^5.5.4
  new_version_plus: ^1.0.1
  cloud_firestore: ^6.4.1
  carousel_slider: ^5.1.2
  overlay_support: ^2.1.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.5.1
  firebase_core: ^4.9.0
  flutter_i18n: ^0.37.1
  flutter_bloc: ^9.1.1
  google_fonts: ^8.1.0
  url_launcher: ^6.3.2
  flutter_mobx: ^2.3.0
  flutter_svg: ^2.3.0
  validadores: ^1.0.9
  injectable: ^3.0.0
  go_router: ^17.2.3
  dart_ping: ^9.0.1
  equatable: ^2.0.8
  graphic: ^2.7.0
  dartz: ^0.10.1
  get_it: ^9.2.1
  intl: ^0.20.2
  mobx: ^2.6.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  injectable_generator: ^3.0.2
  flutter_lints: ^6.0.0
  build_runner: ^2.15.0
  mobx_codegen: ^2.7.7

# configuracao do launch icon
flutter_launcher_icons:
  image_path: "assets/img/logo.png"
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#F4F7FB"
  adaptive_icon_foreground: "assets/img/logo.png"

# configuracao da splash
flutter_native_splash:
  color: "#F7F9FC"
  color_dark: "#07111F"
  image: assets/img/logo.png
  image_dark: assets/img/logo.png
  android: true
  ios: true
  fullscreen: true

  android_12:
    image: assets/img/logo.png
    icon_background_color: "#F7F9FC"
    image_dark: assets/img/logo.png
    icon_background_color_dark: "#07111F"

  web: false

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/img/
    - assets/languages/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
